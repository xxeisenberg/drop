name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and Upload
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: drop
            asset_name: drop-linux-amd64
          - os: macos-13
            artifact_name: drop
            asset_name: drop-macos-amd64
          - os: macos-latest
            artifact_name: drop
            asset_name: drop-macos-arm64
          - os: windows-latest
            artifact_name: drop.exe
            asset_name: drop-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --release

      - name: Build release binary
        run: cargo build --release

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/release/${{ matrix.artifact_name }} target/release/${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: Rename-Item -Path "target\release\${{ matrix.artifact_name }}" -NewName "${{ matrix.asset_name }}"

      - name: Generate checksum (Unix)
        if: matrix.os != 'windows-latest'
        run: shasum -a 256 target/release/${{ matrix.asset_name }} > target/release/${{ matrix.asset_name }}.sha256

      - name: Generate checksum (Windows)
        if: matrix.os == 'windows-latest'
        run: Get-FileHash -Algorithm SHA256 "target\release\${{ matrix.asset_name }}" | Format-List Hash | Out-File -Encoding ASCII "target\release\${{ matrix.asset_name }}.sha256"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            target/release/${{ matrix.asset_name }}
            target/release/${{ matrix.asset_name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
