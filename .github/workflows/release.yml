name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            asset_name: drop-linux-amd64
            binary_path: target/release/drop
          - os: macos-15-intel
            asset_name: drop-macos-amd64
            binary_path: target/release/drop
          - os: macos-14
            asset_name: drop-macos-arm64
            binary_path: target/release/drop
          - os: windows-2025
            asset_name: drop-windows-amd64.exe
            binary_path: target/release/drop.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip "${{ matrix.binary_path }}"

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv "${{ matrix.binary_path }}" "target/release/${{ matrix.asset_name }}"

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Rename-Item -Path "${{ matrix.binary_path }}" -NewName "${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/release/${{ matrix.asset_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*
